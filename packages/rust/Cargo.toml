[package]
name = "l3rs1-sdk"
version = "1.0.0"
edition = "2021"
description = "L3RS-1 Layer-3 Regulated Asset Standard — Reference Implementation"
license = "MIT"
keywords = ["l3rs1", "regulated-asset", "compliance", "digital-asset"]

[dependencies]
sha2 = { version = "0.10", default-features = false, features = ["std"] }
hex = { version = "0.4", default-features = false, features = ["std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_json = "1"

[lib]
name = "l3rs1"
path = "src/lib.rs"
