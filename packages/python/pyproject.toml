[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "l3rs1-sdk"
version = "1.0.0"
description = "L3RS-1 Layer-3 Regulated Asset Standard — Reference Implementation"
requires-python = ">=3.11"
license = { text = "Open Standard – Royalty Free Implementation" }
keywords = ["l3rs1", "regulated-asset", "compliance", "digital-asset"]
dependencies = []  # Zero runtime dependencies — pure stdlib

[project.optional-dependencies]
dev = ["pytest>=8.0", "mypy>=1.9", "ruff>=0.4"]

[tool.mypy]
strict = true
python_version = "3.11"

[tool.ruff]
line-length = 100
target-version = "py311"
