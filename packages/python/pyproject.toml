[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "l3rs1-sdk"
version = "1.0.0"
description = "L3RS-1 Layer-3 Regulated Asset Standard — Reference Implementation"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
keywords = ["l3rs1", "regulated-asset", "compliance", "digital-asset"]
dependencies = []

[tool.setuptools.packages.find]
where = ["."]
include = ["l3rs1*"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "mypy>=1.9", "ruff>=0.4"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true

[tool.ruff]
line-length = 100
target-version = "py311"
