name: SDK CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'test-vectors/**'
      - '.github/workflows/sdk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'test-vectors/**'

concurrency:
  group: sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:

  typescript:
    name: TypeScript (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dev dependencies
        run: npm install
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: node --test tests/sdk.test.js

  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev tools
        run: pip install pytest ruff
      - name: Lint
        run: ruff check packages/python/l3rs1
      - name: Test
        run: PYTHONPATH=packages/python pytest packages/python/tests/ -v
      - name: Conformance vectors
        run: PYTHONPATH=packages/python python test-vectors/run_vectors.py

  go:
    name: Go (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22', '1.23']
    defaults:
      run:
        working-directory: packages/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: packages/go/go.sum
      - name: Tidy
        run: go mod tidy
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -v -race -count=1
      - name: Build
        run: go build ./...

  rust:
    name: Rust (stable)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy
      - name: Test
        run: cargo test --verbose
      - name: Build
        run: cargo build --release

  java:
    name: Java (${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ['21', '22']
    defaults:
      run:
        working-directory: packages/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and test
        run: mvn --batch-mode clean verify

  solidity:
    name: Solidity (Hardhat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/solidity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Compile
        run: npx hardhat compile
      - name: Test
        run: npx hardhat test

  conformance:
    name: Conformance vectors
    runs-on: ubuntu-latest
    needs: [typescript, python, go, rust, java, solidity]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run canonical vector suite
        run: PYTHONPATH=packages/python python test-vectors/run_vectors.py
      - name: Generate conformance report
        run: |
          PYTHONPATH=packages/python python - << 'EOF'
          import json, datetime, platform, sys
          with open('test-vectors/canonical.json') as f:
              tv = json.load(f)
          report = {
              "report_type": "L3RS-1 Conformance Report",
              "standard_version": tv["version"],
              "conformance_class": tv["conformance_class"],
              "implementation": "L3RS-1 Reference Implementation",
              "implementation_version": "1.0.0",
              "generated_at": datetime.datetime.utcnow().isoformat() + "Z",
              "result": "PASS"
          }
          with open('conformance-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          print(json.dumps(report, indent=2))
          EOF
      - name: Upload conformance report
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: conformance-report.json
          retention-days: 90
