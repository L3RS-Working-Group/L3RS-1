name: SDK CI

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
      - '.github/workflows/sdk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/**'
      - '.github/workflows/sdk.yml'

concurrency:
  group: sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── TypeScript ─────────────────────────────────────────────────────────────
  typescript:
    name: TypeScript (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: typescript-dist
          path: packages/typescript/dist/
          retention-days: 7

  # ─── Python ─────────────────────────────────────────────────────────────────
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Type check (mypy)
        run: mypy l3rs1

      - name: Lint (ruff)
        run: ruff check l3rs1

      - name: Test
        run: pytest tests/ -v

  # ─── Go ─────────────────────────────────────────────────────────────────────
  go:
    name: Go (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22', '1.23']
    defaults:
      run:
        working-directory: packages/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: packages/go/go.sum

      - name: Tidy modules
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -count=1

      - name: Build (verify compilation)
        run: go build ./...

  # ─── Rust ───────────────────────────────────────────────────────────────────
  rust:
    name: Rust (stable)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release

  # ─── Java ───────────────────────────────────────────────────────────────────
  java:
    name: Java (${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ['21', '22']
    defaults:
      run:
        working-directory: packages/java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn --batch-mode clean verify

  # ─── Solidity ───────────────────────────────────────────────────────────────
  solidity:
    name: Solidity (Hardhat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/solidity
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/solidity/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run contract tests
        run: npx hardhat test

      - name: Check contract sizes
        run: npx hardhat size-contracts

  # ─── Conformance: cross-language test vectors ────────────────────────────────
  conformance:
    name: Conformance test vectors
    runs-on: ubuntu-latest
    needs: [typescript, python, go, rust]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python SDK
        run: pip install -e "packages/python[dev]"

      - name: Run canonical vector suite
        run: python test-vectors/run_vectors.py

      - name: Verify vector file integrity
        run: |
          python -c "
          import json, sys
          with open('test-vectors/canonical.json') as f:
              tv = json.load(f)
          required = ['asset_id_construction', 'state_transitions', 'fee_allocation',
                      'txid_construction', 'crosschain_cid', 'invariants']
          missing = [k for k in required if k not in tv['vectors']]
          if missing:
              print(f'Missing vector sections: {missing}')
              sys.exit(1)
          print(f'Vector file valid: {len(tv[\"vectors\"])} sections')
          "
