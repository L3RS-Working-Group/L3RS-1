name: Conformance

on:
  push:
    branches: [main]
    paths:
      - 'packages/python/**'
      - 'test-vectors/**'
      - '.github/workflows/conformance.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/python/**'
      - 'test-vectors/**'
  workflow_dispatch:

jobs:

  reference-impl:
    name: Reference implementation conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run canonical vector suite
        run: PYTHONPATH=packages/python python test-vectors/run_vectors.py

      - name: Generate conformance report
        run: |
          PYTHONPATH=packages/python python - << 'EOF'
          import json, datetime, platform, sys
          with open('test-vectors/canonical.json') as f:
              tv = json.load(f)
          report = {
              "report_type": "L3RS-1 Conformance Report",
              "standard_version": tv["version"],
              "conformance_class": tv["conformance_class"],
              "implementation": "L3RS-1 Python Reference Implementation",
              "implementation_version": "1.0.0",
              "generated_at": datetime.datetime.utcnow().isoformat() + "Z",
              "python_version": sys.version,
              "platform": platform.platform(),
              "vectors_passed": len(tv["vectors"]),
              "invariants_enforced": list(tv["vectors"]["invariants"].keys()),
              "result": "PASS"
          }
          with open('conformance-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          print(json.dumps(report, indent=2))
          EOF

      - name: Upload conformance report
        uses: actions/upload-artifact@v4
        with:
          name: conformance-report
          path: conformance-report.json
          retention-days: 90

  hash-consistency:
    name: Cross-language hash consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify Asset_ID canonical hash
        run: |
          PY_HASH=$(PYTHONPATH=packages/python python3 -c "
          from l3rs1.crypto import construct_asset_id
          print(construct_asset_id(
              '0279be667ef9dcbbac55a06295ce870b07029bfcdb2dce28d959f2815b16f81798',
              1740355200,
              '0000000000000001'
          ))")
          EXPECTED="593f0dfb3da2fb8e8e21059e26f4a1875e9059a6d9d634e3065541e6c193506a"
          echo "Computed: $PY_HASH"
          echo "Expected: $EXPECTED"
          [ "$PY_HASH" = "$EXPECTED" ] && echo "PASS" || (echo "FAIL" && exit 1)

      - name: Verify canonical serialization
        run: |
          PYTHONPATH=packages/python python3 -c "
          from l3rs1.crypto import canonicalize
          assert canonicalize({'z':3,'a':1,'m':2}) == '{\"a\":1,\"m\":2,\"z\":3}'
          print('PASS: canonical serialization correct')
          "

      - name: Verify all 9 state transitions
        run: |
          PYTHONPATH=packages/python python3 -c "
          from l3rs1.types import AssetState
          from l3rs1.modules import apply_state_transition
          cases = [
              ('ISSUED','ACTIVATION','ACTIVE'),
              ('ACTIVE','BREACH','RESTRICTED'),
              ('ACTIVE','FREEZE','FROZEN'),
              ('RESTRICTED','CLEARED','ACTIVE'),
              ('FROZEN','RELEASE','ACTIVE'),
              ('ACTIVE','REDEMPTION','REDEEMED'),
              ('REDEEMED','FINALIZATION','BURNED'),
              ('ACTIVE','SUSPENSION','SUSPENDED'),
              ('SUSPENDED','REINSTATEMENT','ACTIVE'),
          ]
          for f, t, to in cases:
              r = apply_state_transition(AssetState(f), t)
              assert r.success and r.new_state == AssetState(to), f'FAIL: {f}--{t}'
          print('PASS: all 9 state transitions correct')
          "
