name: SDK CI

on:
  push:
    branches: [main]
    paths:
      - 'sdk/**'
      - '.github/workflows/sdk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sdk/**'
      - '.github/workflows/sdk.yml'

concurrency:
  group: sdk-${{ github.ref }}
  cancel-in-progress: true

jobs:

  typescript:
    name: TypeScript (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/packages/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/packages/typescript/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: sdk/packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Type check (mypy)
        run: mypy l3rs1
      - name: Lint (ruff)
        run: ruff check l3rs1
      - name: Test
        run: pytest tests/ -v

  go:
    name: Go (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22', '1.23']
    defaults:
      run:
        working-directory: sdk/packages/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: sdk/packages/go/go.sum
      - name: Tidy modules
        run: go mod tidy
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -v -race -count=1
      - name: Build
        run: go build ./...

  rust:
    name: Rust (stable)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/packages/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/packages/rust
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test --verbose
      - name: Build release
        run: cargo build --release

  java:
    name: Java (${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ['21', '22']
    defaults:
      run:
        working-directory: sdk/packages/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and test
        run: mvn --batch-mode clean verify

  solidity:
    name: Solidity (Hardhat)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/packages/solidity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: sdk/packages/solidity/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Compile contracts
        run: npx hardhat compile
      - name: Run contract tests
        run: npx hardhat test

  conformance:
    name: Conformance test vectors
    runs-on: ubuntu-latest
    needs: [typescript, python, go, rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python SDK
        run: pip install -e "sdk/packages/python[dev]"
      - name: Run canonical vector suite
        run: python sdk/test-vectors/run_vectors.py
