name: Release
on:
  push:
    tags:
      - 'sdk/v*'   # e.g. sdk/v1.0.0, sdk/v1.1.0

permissions:
  contents: write   # to create GitHub Release
  id-token: write   # for PyPI trusted publishing

jobs:

  # ─── Validate version consistency ───────────────────────────────────────────
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/sdk/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing SDK version: $TAG"

      - name: Check all packages match tag version
        run: |
          VERSION="${GITHUB_REF#refs/tags/sdk/v}"
          # TypeScript
          TS_VER=$(node -p "require('./packages/typescript/package.json').version")
          # Python
          PY_VER=$(python3 -c "import tomllib; print(tomllib.load(open('packages/python/pyproject.toml','rb'))['project']['version'])")
          # Rust
          RUST_VER=$(grep '^version' packages/rust/Cargo.toml | head -1 | cut -d'"' -f2)
          # Go (uses git tag directly — no version file check needed)

          echo "Tag:        $VERSION"
          echo "TypeScript: $TS_VER"
          echo "Python:     $PY_VER"
          echo "Rust:       $RUST_VER"

          if [ "$TS_VER" != "$VERSION" ] || [ "$PY_VER" != "$VERSION" ] || [ "$RUST_VER" != "$VERSION" ]; then
            echo "ERROR: Version mismatch between tag and package files"
            exit 1
          fi
          echo "All versions consistent."

  # ─── Run full CI before releasing ───────────────────────────────────────────
  ci-gate:
    name: CI gate
    needs: validate
    uses: ./.github/workflows/sdk.yml

  # ─── Publish: npm (TypeScript) ───────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: [validate, ci-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Publish: PyPI (Python) ─────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [validate, ci-gate]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/l3rs1-sdk/
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build distributions
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist/

  # ─── Publish: crates.io (Rust) ──────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: [validate, ci-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust

      - name: Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}

  # ─── Publish: npm (Solidity contracts) ──────────────────────────────────────
  publish-contracts:
    name: Publish @l3rs/contracts to npm
    needs: [validate, ci-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/solidity
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npx hardhat compile
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── GitHub Release ──────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [validate, publish-npm, publish-pypi, publish-crates, publish-contracts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release archive
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          zip -r l3rs1-sdk-v${VERSION}.zip sdk/ \
            -x "*.pyc" -x "*/__pycache__/*" -x "*/node_modules/*" \
            -x "*/target/*" -x "*/dist/*"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: L3RS-1 SDK v${{ needs.validate.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## L3RS-1 SDK v${{ needs.validate.outputs.version }}

            Reference implementation of the L3RS-1 Layer-3 Regulated Asset Standard.
            **Conformance class: CROSSCHAIN** — all invariants I₁–I₁₁ enforced.

            ### Packages

            | Language | Package | Install |
            |---|---|---|
            | TypeScript | [`@l3rs/reference-impl`](https://npmjs.com/package/@l3rs/reference-impl) | `npm install @l3rs/reference-impl` |
            | Python | [`l3rs1-sdk`](https://pypi.org/project/l3rs1-sdk/) | `pip install l3rs1-sdk` |
            | Rust | [`l3rs1-sdk`](https://crates.io/crates/l3rs1-sdk) | `cargo add l3rs1-sdk` |
            | Go | [`github.com/L3RS-Foundation/L3RS-1/sdk/go`](https://pkg.go.dev/github.com/L3RS-Foundation/L3RS-1/sdk/go) | `go get github.com/L3RS-Foundation/L3RS-1/sdk/go@v${{ needs.validate.outputs.version }}` |
            | Java | [`foundation.l3rs1:l3rs1-sdk`](https://central.sonatype.com) | See `pom.xml` |
            | Solidity | [`@l3rs/contracts`](https://npmjs.com/package/@l3rs/contracts) | `npm install @l3rs/contracts` |

            ### What's included
            - Full CROSSCHAIN conformance class implementation
            - Canonical test vectors per §11.5
            - Zero external runtime dependencies (all packages)
            - All 11 protocol invariants enforced

            See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          files: l3rs1-sdk-v${{ needs.validate.outputs.version }}.zip
          draft: false
          prerelease: false
